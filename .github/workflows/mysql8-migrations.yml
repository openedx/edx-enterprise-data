name: Migrations check on mysql8

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - master

jobs:
  check_migrations:
    name: check migrations
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-latest ]
        python-version: [ "3.12" ]

    steps:
    - name: Checkout repo
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

    - name: Install uv
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      with:
        enable-cache: true
        python-version: "${{ matrix.python-version }}"

    - name: Install system Packages
      run: |
        sudo apt-get update

    - name: Ubuntu and sql Versions
      run: |
        lsb_release -a
        mysql -V

    - name: Install Python dependencies
      run: |
        uv sync --group dev
        uv pip uninstall mysqlclient
        uv pip install --no-binary mysqlclient mysqlclient

    - name: Initiate Services
      run: |
        sudo /etc/init.d/mysql start

    - name: Reset mysql password
      run: |
        cat <<EOF | mysql -h 127.0.0.1 -u root --password=root
          UPDATE mysql.user SET authentication_string = null WHERE user = 'root';
          FLUSH PRIVILEGES;
        EOF

    - name: Run migrations
      env:
        DATABASES: default
        DB_ENGINE: django.db.backends.mysql
        DB_USER: root
        DB_PASSWORD: ""
        DB_HOST: localhost
        DB_PORT: 3306
      run: |
        echo "Running the migrations."
        for db in $DATABASES;
        do
          echo "CREATE DATABASE IF NOT EXISTS db_$db;" | sudo mysql -u root
          export DB_NAME=db_$db
          uv run python manage.py migrate --noinput --run-syncdb --database "$db" --settings=enterprise_data.settings.test
        done
