[tox]
envlist = py312-django{42,52}, quality, docs
requires = tox-uv>=1

[testenv]
runner = uv-venv-lock-runner
setenv =
    DJANGO_SETTINGS_MODULE=enterprise_data.settings.test
dependency_groups =
    django42: django42
    django52: test
commands =
    pytest -Wd {posargs}

[testenv:quality]
runner = uv-venv-lock-runner
dependency_groups = quality
commands =
    ruff check .
    ruff format --check .

[testenv:docs]
runner = uv-venv-lock-runner
basepython = python3.12
dependency_groups = doc
allowlist_externals = make
commands =
    make -C docs html
